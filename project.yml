name: SwipeClean
options:
  bundleIdPrefix: com.example
  xcodeVersion: "15.0"
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
targets:
  SwipeClean:
    type: application
    platform: iOS
    sources:
      - SwipeClean
    info:
      path: SwipeClean/Support/Info.plist
      properties:
        CFBundleDisplayName: SwipeClean
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSPhotoLibraryUsageDescription: "整理対象のボケた写真やスクリーンショットを検出するために、写真フォルダへのアクセス権限が必要です。"
    entitlements:
      path: SwipeClean/Support/SwipeClean.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.example.SwipeClean
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SwipeClean
        INFOPLIST_FILE: SwipeClean/Support/Info.plist

  SwipeCleanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/SwipeCleanTests
    dependencies:
      - target: SwipeClean

  SwipeCleanUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/SwipeCleanUITests
    dependencies:
      - target: SwipeClean
    settings:
      base:
        TEST_TARGET_NAME: SwipeClean

schemes:
  SwipeClean:
    build:
      targets:
        SwipeClean: all
        SwipeCleanTests: [test]
        SwipeCleanUITests: [test]
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: SwipeCleanTests
        - name: SwipeCleanUITests
